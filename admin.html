<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caracas Ayuda — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2563EB; --blue-dark: #1d4ed8; --blue-light: #eff6ff;
      --green: #16a34a; --green-light: #dcfce7; --green-text: #166534;
      --amber: #ca8a04; --amber-light: #fef9c3; --amber-text: #854d0e;
      --red: #dc2626; --red-light: #fee2e2; --red-text: #991b1b;
      --text: #111827; --text-muted: #6b7280;
      --border: #e5e7eb; --bg: #ffffff; --bg-secondary: #f9fafb;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    #login-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 360px; text-align: center; }
    #login-box svg { height: 28px; width: auto; fill: var(--text); margin-bottom: 20px; }
    #login-box h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    #login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    #login-box input { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; outline: none; font-family: inherit; }
    #login-box input:focus { border-color: var(--blue); }
    #login-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 600; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
    #login-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

    /* ADMIN */
    #admin-screen { display: none; }
    #admin-header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 16px; }
    #admin-header svg { height: 22px; width: auto; fill: var(--text); flex-shrink: 0; }
    #admin-header-right { display: flex; align-items: center; gap: 10px; }
    #logout-btn { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; }
    #visit-btn { font-size: 13px; color: var(--blue); background: var(--blue-light); border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; text-decoration: none; }

    #admin-body { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

    /* STATS */
    #stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; }

    /* FILTERS */
    #filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    #filter-bar span { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
    .fbtn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.1s; }
    .fbtn:hover { background: var(--bg-secondary); }
    .fbtn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .fbtn.f-ayuda.active  { background: #2563EB; border-color: #2563EB; }
    .fbtn.f-necesidad.active { background: #dc2626; border-color: #dc2626; }
    .fbtn.f-pending.active { background: var(--amber); border-color: var(--amber); }
    .fbtn.f-verified.active { background: var(--green); border-color: var(--green); }

    #search-admin { padding: 7px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius); outline: none; font-family: inherit; width: 220px; }
    #search-admin:focus { border-color: var(--blue); }

    /* CARD LIST */
    #results-count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .item-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; }
    .item-card:hover { border-color: #d1d5db; }

    .item-left { flex: 1; min-width: 0; }
    .item-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-verified { background: var(--green-light); color: var(--green-text); }
    .badge-pending  { background: var(--amber-light); color: var(--amber-text); }
    .badge-ayuda    { background: #dbeafe; color: #1e40af; }
    .badge-necesidad{ background: var(--red-light); color: var(--red-text); }
    .item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-cat  { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .item-meta { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    .item-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; min-width: 100px; }
    .btn-sm { padding: 5px 10px; font-size: 12px; font-weight: 500; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; text-align: center; white-space: nowrap; }
    .btn-green    { background: var(--green-light); color: var(--green-text); }
    .btn-amber    { background: var(--amber-light); color: var(--amber-text); }
    .btn-red      { background: var(--red-light);   color: var(--red-text); }
    .btn-blue-soft{ background: #dbeafe; color: #1e40af; }
    .btn-red-soft { background: var(--red-light); color: var(--red-text); }

    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  </style>
</head>
<body>

    <div id="admin-header-right">
      <a href="index.html" id="visit-btn">Ver mapa →</a>
      <button id="logout-btn">Cerrar sesión</button>
    </div>
  </div>

  <div id="admin-body">
    <div id="stats-row">
      <div class="stat-card"><div class="stat-label">Total puntos</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">🔵 Puntos de ayuda</div><div class="stat-value" id="stat-ayuda" style="color:#2563EB">—</div></div>
      <div class="stat-card"><div class="stat-label">🔴 Puntos de necesidad</div><div class="stat-value" id="stat-necesidad" style="color:#dc2626">—</div></div>
      <div class="stat-card"><div class="stat-label">✅ Verificados</div><div class="stat-value" id="stat-verified" style="color:var(--green)">—</div></div>
      <div class="stat-card"><div class="stat-label">⏳ Por verificar</div><div class="stat-value" id="stat-pending" style="color:var(--amber)">—</div></div>
    </div>

    <div id="filter-bar">
      <span>Filtrar:</span>
      <button class="fbtn active" data-filter="all">Todos</button>
      <button class="fbtn f-ayuda" data-filter="ayuda">🔵 Ayuda</button>
      <button class="fbtn f-necesidad" data-filter="necesidad">🔴 Necesidad</button>
      <button class="fbtn f-pending" data-filter="pending">⏳ Por verificar</button>
      <button class="fbtn f-verified" data-filter="verified">✅ Verificados</button>
      <input type="text" id="search-admin" placeholder="Buscar por nombre..." />
    </div>

    <div id="results-count"></div>
    <div class="card-list" id="list-puntos"><div class="empty-state">Cargando...</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://zxpfumbsxgnfzxjlhocu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_bx7plOxEb3M4aNID_stt-g_WPh-FS88';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const cats = {
  acopio:'📦', donaciones:'🤝', agua:'💧', comida:'🍲', refugio:'🏠',
  medico:'🏥', medicamentos:'💊', carga:'🔋', mascotas:'🐶',
  combustible:'⛽', transporte:'🚗', higiene:'🧴',
  alimentos:'🍲', ropa:'👕', rescate:'🪖', herramientas:'🧰',
  iluminacion:'🔦', bebes:'👶', voluntarios:'🩺'
};

let allPuntos = [];
let activeFilter = 'all';
let searchQ = '';

// AUTH
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('admin-email').value.trim();
  const pass  = document.getElementById('admin-pass').value;
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('login-error').style.display = 'block'; }
  else { showAdmin(); }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await db.auth.signOut(); location.reload();
});

db.auth.onAuthStateChange((event, session) => { if (session) showAdmin(); });

function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadAll();
}

async function loadAll() {
  const { data } = await db.from('puntos').select('*').order('created_at', { ascending: false });
  allPuntos = data || [];
  updateStats();
  renderPuntos();
}

function updateStats() {
  const ayuda     = allPuntos.filter(p => (p.tipo||'ayuda') === 'ayuda').length;
  const necesidad = allPuntos.filter(p => p.tipo === 'necesidad').length;
  const verified  = allPuntos.filter(p => p.estado === 'verified').length;
  const pending   = allPuntos.filter(p => p.estado === 'pending').length;
  document.getElementById('stat-total').textContent     = allPuntos.length;
  document.getElementById('stat-ayuda').textContent     = ayuda;
  document.getElementById('stat-necesidad').textContent = necesidad;
  document.getElementById('stat-verified').textContent  = verified;
  document.getElementById('stat-pending').textContent   = pending;
}

function getFiltered() {
  return allPuntos.filter(p => {
    const tipo = p.tipo || 'ayuda';
    if (activeFilter === 'ayuda'    && tipo !== 'ayuda')         return false;
    if (activeFilter === 'necesidad'&& tipo !== 'necesidad')     return false;
    if (activeFilter === 'pending'  && p.estado !== 'pending')   return false;
    if (activeFilter === 'verified' && p.estado !== 'verified')  return false;
    if (searchQ && !p.nombre.toLowerCase().includes(searchQ) && !(p.direccion||'').toLowerCase().includes(searchQ)) return false;
    return true;
  });
}

function renderPuntos() {
  const filtered = getFiltered();
  document.getElementById('results-count').textContent = `${filtered.length} punto${filtered.length !== 1 ? 's' : ''}`;
  const el = document.getElementById('list-puntos');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state">No hay puntos con estos filtros.</div>'; return; }

  el.innerHTML = filtered.map(p => {
    const tipo = p.tipo || 'ayuda';
    const icon = cats[p.categoria] || '📍';
    const catLabel = p.categoria ? p.categoria.charAt(0).toUpperCase() + p.categoria.slice(1) : '';
    const fecha = new Date(p.created_at).toLocaleDateString('es-VE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    return `
    <div class="item-card" id="punto-${p.id}">
      <div class="item-left">
        <div class="item-badges">
          <span class="badge ${tipo === 'ayuda' ? 'badge-ayuda' : 'badge-necesidad'}">${tipo === 'ayuda' ? '🔵 Ayuda' : '🔴 Necesidad'}</span>
          <span class="badge ${p.estado === 'verified' ? 'badge-verified' : 'badge-pending'}">${p.estado === 'verified' ? '✅ Verificado' : '⏳ Por verificar'}</span>
        </div>
        <div class="item-name">${icon} ${p.nombre}</div>
        <div class="item-cat">${catLabel}</div>
        <div class="item-meta">
          ${p.direccion ? `📍 ${p.direccion}<br>` : ''}
          ${p.horario   ? `🕐 ${p.horario}<br>`   : ''}
          ${p.telefono  ? `📞 ${p.telefono}<br>`  : ''}
          ${p.descripcion ? `${p.descripcion}<br>` : ''}
          <span style="opacity:0.6;font-size:11px">${fecha}</span>
        </div>
      </div>
      <div class="item-actions">
        ${p.estado !== 'verified'
          ? `<button class="btn-sm btn-green" onclick="cambiarEstado('${p.id}','verified')">✅ Verificar</button>`
          : `<button class="btn-sm btn-amber" onclick="cambiarEstado('${p.id}','pending')">⏳ Pendiente</button>`}
        ${tipo === 'ayuda'
          ? `<button class="btn-sm btn-red-soft" onclick="cambiarTipo('${p.id}','necesidad')">🔴 Es necesidad</button>`
          : `<button class="btn-sm btn-blue-soft" onclick="cambiarTipo('${p.id}','ayuda')">🔵 Es ayuda</button>`}
        <a class="btn-sm" href="https://maps.google.com/?q=${p.lat},${p.lng}" target="_blank" style="background:#f0f9ff;color:#0369a1;text-decoration:none">🗺️ Ver mapa</a>
        <button class="btn-sm btn-red" onclick="eliminarPunto('${p.id}')">✗ Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

// FILTROS
document.querySelectorAll('.fbtn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    renderPuntos();
  });
});

document.getElementById('search-admin').addEventListener('input', function() {
  searchQ = this.value.toLowerCase();
  renderPuntos();
});

// ACCIONES
async function cambiarEstado(id, estado) {
  const { error } = await db.from('puntos').update({ estado }).eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  const p = allPuntos.find(x => x.id === id);
  if (p) p.estado = estado;
  updateStats();
  renderPuntos();
}

async function cambiarTipo(id, tipo) {
  const { error } = await db.from('puntos').update({ tipo }).eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  const p = allPuntos.find(x => x.id === id);
  if (p) p.tipo = tipo;
  updateStats();
  renderPuntos();
}

async function eliminarPunto(id) {
  if (!confirm('¿Eliminar este punto del mapa?')) return;
  const { error } = await db.from('puntos').delete().eq('id', id);
  if (error) { alert('Error: ' + error.message); return; }
  allPuntos = allPuntos.filter(x => x.id !== id);
  updateStats();
  renderPuntos();
}
</script>
